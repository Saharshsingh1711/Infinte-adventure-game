<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Infinite Game Master</h1>
<div id="chat-history"></div>
<input id="userInput" placeholder="Type your scenario or action..." onkeydown="if(event.key==='Enter') askAI()">
<button onclick="askAI()">Action</button>
</body>
<script>



let chatHistory = [
  {
    role: "user",
    parts: [{ text: "You are a creative Text Adventure Game Master. I will describe a setting or scenario. You will adapt to that setting and act as the narrator/GM. Start by acknowledging the setting and describing the immediate surroundings." }]
  }
];


window.onload = () => {
  const historyDiv = document.getElementById("chat-history");
  historyDiv.innerHTML += `<div class="message ai-msg">Welcome, adventurer. Please describe the setting, genre, or scenario you wish to play (e.g., "I am a knight in a dragon's cave" or "Sci-fi horror on Mars").</div>`;
};

async function askAI() {
  const input = document.getElementById("userInput");
  const userText = input.value;
  if (!userText) return;
  
  const historyDiv = document.getElementById("chat-history");
  historyDiv.innerHTML += `<div class="message user-msg">${userText}</div>`;
  input.value = "";

  // Add to history
  chatHistory.push({ role: "user", parts: [{ text: userText }] });

  try {
    const aiResponse = await getAIResponse(chatHistory);
    historyDiv.innerHTML += `<div class="message ai-msg">${aiResponse}</div>`;
    historyDiv.scrollTop = historyDiv.scrollHeight; // Scroll to bottom
    
    // Save AI response
    chatHistory.push({ role: "model", parts: [{ text: aiResponse }] });
  } catch (err) {
    console.error(err);
    historyDiv.innerHTML += `<div class="message ai-msg">Error: ${err.message}</div>`;
  }
}
async function getAIResponse(history) {
  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          contents: history,
        }),
      }
    );
    if (!response.ok) {
      throw new Error("API request failed");
    }
    const data = await response.json();
    return data?.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
  } catch (error) {
    console.error(error);
    return "Error getting response";
  }
}
</script>
</html>
